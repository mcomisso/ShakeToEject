name: ShakeToEject
options:
  bundleIdPrefix: com.mcsoftware
  deploymentTarget:
    macOS: "14.0"
  createIntermediateGroups: true
  generateEmptyDirectories: false
  indentWidth: 4
  tabWidth: 4
  xcodeVersion: "26.0"

packages:
  Sparkle:
    url: https://github.com/sparkle-project/Sparkle
    from: "2.8.0"

settings:
  base:
    SWIFT_VERSION: "6.0"
    ENABLE_HARDENED_RUNTIME: YES
    DEVELOPMENT_TEAM: 382G4857JD
    DEAD_CODE_STRIPPING: YES
    CLANG_ENABLE_MODULES: YES
    SWIFT_STRICT_CONCURRENCY: complete
  configs:
    Debug:
      CODE_SIGN_STYLE: Automatic
      CODE_SIGN_IDENTITY: "Apple Development"
    Release:
      CODE_SIGN_STYLE: Manual
      CODE_SIGN_IDENTITY: "Developer ID Application"
      PROVISIONING_PROFILE_SPECIFIER: ""

targets:
  ShakeToEject:
    type: application
    platform: macOS
    sources:
      - path: App
      - path: Shared
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.mcsoftware.ShakeToEject
        PRODUCT_NAME: ShakeToEject
        MARKETING_VERSION: "1.0.1"
        CURRENT_PROJECT_VERSION: "1"
        COMBINE_HIDPI_IMAGES: YES
        CODE_SIGN_ENTITLEMENTS: App/ShakeToEject.entitlements
    info:
      path: App/Info.plist
      properties:
        LSUIElement: YES
        CFBundleDisplayName: ShakeToEject
        NSHumanReadableCopyright: "© 2026 Matteo Comisso. MIT licensed."
        CFBundleShortVersionString: $(MARKETING_VERSION)
        CFBundleVersion: $(CURRENT_PROJECT_VERSION)
        CFBundleExecutable: $(EXECUTABLE_NAME)
        CFBundleIdentifier: $(PRODUCT_BUNDLE_IDENTIFIER)
        CFBundleName: $(PRODUCT_NAME)
        CFBundlePackageType: $(PRODUCT_BUNDLE_PACKAGE_TYPE)
        CFBundleInfoDictionaryVersion: "6.0"
        SUFeedURL: "https://raw.githubusercontent.com/mcomisso/ShakeToEject/main/appcast.xml"
        SUPublicEDKey: "uYfhP5vfYlV/5L0CLGcxiU1TI9wpMb/OdhVYtzb4sj8="
        SUEnableAutomaticChecks: YES
        SUScheduledCheckInterval: 86400
    dependencies:
      - package: Sparkle

  ShakeToEjectTests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - path: Tests
      - path: App/Sensing/HIDReport.swift
      - path: App/Sensing/ShakeDetector.swift
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.mcsoftware.ShakeToEject.Tests
        PRODUCT_NAME: ShakeToEjectTests
        GENERATE_INFOPLIST_FILE: YES
        SWIFT_VERSION: "6.0"
        SWIFT_STRICT_CONCURRENCY: complete
        SWIFT_EMIT_LOC_STRINGS: NO
        CODE_SIGNING_REQUIRED: NO
        CODE_SIGN_IDENTITY: ""
