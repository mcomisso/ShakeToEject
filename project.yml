name: ShakeToEject
options:
  bundleIdPrefix: com.mcsoftware
  deploymentTarget:
    macOS: "14.0"
  createIntermediateGroups: true
  generateEmptyDirectories: false
  indentWidth: 4
  tabWidth: 4
  xcodeVersion: "26.0"

settings:
  base:
    SWIFT_VERSION: "6.0"
    ENABLE_HARDENED_RUNTIME: YES
    CODE_SIGN_STYLE: Automatic
    CODE_SIGN_IDENTITY: "Apple Development"
    DEVELOPMENT_TEAM: 382G4857JD
    DEAD_CODE_STRIPPING: YES
    CLANG_ENABLE_MODULES: YES
    SWIFT_STRICT_CONCURRENCY: complete

targets:
  ShakeToEject:
    type: application
    platform: macOS
    sources:
      - path: App
      - path: Shared
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.mcsoftware.ShakeToEject
        PRODUCT_NAME: ShakeToEject
        GENERATE_INFOPLIST_FILE: YES
        INFOPLIST_KEY_LSUIElement: YES
        INFOPLIST_KEY_CFBundleDisplayName: ShakeToEject
        INFOPLIST_KEY_NSHumanReadableCopyright: "© 2026 Matteo Comisso. MIT licensed."
        MARKETING_VERSION: "1.0.0"
        CURRENT_PROJECT_VERSION: "1"
        COMBINE_HIDPI_IMAGES: YES
        CODE_SIGN_ENTITLEMENTS: App/ShakeToEject.entitlements

  ShakeToEjectTests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - path: Tests
      - path: App/Sensing/HIDReport.swift
      - path: App/Sensing/ShakeDetector.swift
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.mcsoftware.ShakeToEject.Tests
        PRODUCT_NAME: ShakeToEjectTests
        GENERATE_INFOPLIST_FILE: YES
        SWIFT_VERSION: "6.0"
        SWIFT_STRICT_CONCURRENCY: complete
        SWIFT_EMIT_LOC_STRINGS: NO
        CODE_SIGNING_REQUIRED: NO
        CODE_SIGN_IDENTITY: ""
